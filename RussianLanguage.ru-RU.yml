"QUEST_AMBERITE_INGOTS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Руке в Святилище."
"QUEST_AMBERITE_INGOTS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Руке."
"QUEST_AMBERITE_INGOTS_DESCRIPTION": "Если ты хочешь сделать немного Эмберитовых слитков, так чёрт возьми давай сделаем! <color=yellow>Принеси мне 5 Эмберитовой руды и 3 Скоплений Меди!</color>\n\n\n<color=cyan>Ты сможешь найти Эмберитовую руду в Долине Туул, но будь осторожен, там бродят дикие Меккабаны!</color>\n"
"QUEST_AMBERITE_INGOTS_NAME": "Эмберитовые Слитки"
"QUEST_ANCIENT_BEINGS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_ANCIENT_BEINGS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_ANCIENT_BEINGS_DESCRIPTION": "Это тревожит, малыш. <color=cyan>В Роще Полумесяца бродят рои древних Големов,</color> и они очень враждебны... \n\nГолемы когда-то были мирными созданиями, защищавшими от монстров, но теперь они служат им. <color=cyan>Полагаю, что после Разлома мира самоцветы в их головах свели их с ума...</color> В любом случае, мне нужно изучить всё это. \n\n<color=yellow>Победи 15 малых и больших Големов, и собери 15 их Самоцветов.</color> За твои труды будет положена награда..."
"QUEST_ANCIENT_BEINGS_NAME": "Древние Творения"
"QUEST_A_WARM_WELCOME_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_A_WARM_WELCOME_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_A_WARM_WELCOME_DESCRIPTION": "Ах... Вижу, ты проснулся, и твоя душа всё так же светла. Прошу, не бойся. <color=cyan>Это место - твой дом, наш дом.</color>\n\nПрежде чем ты отправишься в путь, познакомься с Святилищем... <color=cyan>Ведь это последнее безопасное пристанище в этом Расколотом мире.</color>\n\n<color=yellow> Вернись ко мне, когда увидишь Мировой Портал, Казармы, Лавку и Врата во Внешнее Убежище.</color> \n\n<i>И, конечно, не спеши...</i>"
"QUEST_A_WARM_WELCOME_NAME": "Тёплый Приём"
"QUEST_BECKONING_FOES_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_BECKONING_FOES_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_BECKONING_FOES_DESCRIPTION": "Я покажу тебе путь силы с этим свитком, заблудший. <color=yellow>Прочитай его, и ты овладеешь Насмешкой.</color> Эта способность не только ослабит врагов рядом с тобой, но и покажет, какова ты угроза для них.\n\n<color=cyan>Если потеряешь свиток, возвращайся ко мне и я дам тебе новый.</color>\n"
"QUEST_BECKONING_FOES_NAME": "Манящие Враги"
"QUEST_BLOSSOM_OF_LIFE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_BLOSSOM_OF_LIFE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_BLOSSOM_OF_LIFE_DESCRIPTION": "<color=cyan>Ты готов к новому уроку, малыш? </color> Боюсь, в пути тебе приходилось нелегко... Монстры в этом мире жестоки.\n\n<color=yellow>Я дарю тебе этот свиток. Он научит тебя Курису - священной способности, исцеляющей тебя и союзников.</color>\n\nКстати, если выберешь путь Мистика, ты получишь ещё более мощное целительное умение... Запомни это, ладно?\n\n<color=cyan>Если вдруг потеряешь свиток, пожалуйста возращайся ко мне... У меня всегда есть лишние свитки для моих студентов. И не спеши, хорошо, малыш?</color>\n"
"QUEST_BLOSSOM_OF_LIFE_NAME": "Рассцвет Жизни"
"QUEST_CALL_OF_FURY_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_CALL_OF_FURY_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_CALL_OF_FURY_DESCRIPTION": "Я вижу ты становишься сильнее, заблудший. Если ты хочешь ощутить часть моей силы, <color=cyan>я могу предоставить тебе свиток который научит тебя Мульти Удару.</color>\n\nЭта способность неумолима. Я знаю что ты сможешь ею воспользоваться, побывав во многих битвах. Используй свиток и освой твое новое умение.\n\n<color=yellow>Если потеряешь свиток возвращайся ко мне, я дам ещё один. Теперь иди.</color>\n\n"
"QUEST_CALL_OF_FURY_NAME": "Зов Ярости"
"QUEST_CLEANING_TERRACE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_CLEANING_TERRACE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_CLEANING_TERRACE_DESCRIPTION": "Хмф, эти противные Слаймеки не унимаются. <color=cyan>Терраса Эффолда</color> нуждается в срочной уборке... \n\nМожет быть ты можешь оказать мне услугу и показать немного силы твоих умений? <color=yellow>Убей 15 Слаймеков,</color> а потом возращайся ко мне когда сможешь...\n"
"QUEST_CLEANING_TERRACE_NAME": "Уборка Террасы"
"QUEST_CLEANSING_THE_GROVE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_CLEANSING_THE_GROVE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_CLEANSING_THE_GROVE_DESCRIPTION": "<color=yellow>[(УР20-25) Квест Рощи Полумесяца]</color>\n<color=cyan>Роща Полумесяца наносит ответный удар нашим силам, заблудший. Существа внутри стали сильнее и гораздо смертельнее.</color> Я глубоко разочарован Обетниками, поддавшимся этой порче... Они должны быть наказаны.\n\n<color=yellow>Уничтожь 20 Пустокорых, 10 Рыцарей Смерти, 10 Водных и Вспыхнувших Мачгрибов, и 15 Полуголемов.</color> Немедленно возращайся ко мне после выполнения задания.\n"
"QUEST_CLEANSING_THE_GROVE_NAME": "Очищение Рощи"
"QUEST_COLD_SHOULDER_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_COLD_SHOULDER_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_COLD_SHOULDER_DESCRIPTION": "Пора учиться, малыш... Я дам тебе свиток для твоего путешествия. <color=yellow>Он называется Криа...</color> Использование заклинания призывает ледяные иглы, замедляющие твоих врагов.\n\n\n<color=yellow>Это умение Разума...</color> Чем выше твой показатель Разума, тем больше урона оно нанесёт. Всё очень просто, правда.\n\n<color=cyan>Если потеряешь свой свиток, пожалуйста вернись ко мне, и я дам новый. Учись хорошо, малыш...</color>\n"
"QUEST_COLD_SHOULDER_NAME": "Холодное Плечо"
"QUEST_COMMUNING_CATACOMBS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_COMMUNING_CATACOMBS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_COMMUNING_CATACOMBS_DESCRIPTION": "Это довольно ужасно, понимаешь... <color=cyan>Катакомбы Внешнего Святилища</color> было местом где я могла проводить свои мистические ритуалы для иследования нежити. Что там теперь творится для меня загадка...\n\n<color=cyan>Когда мир был Расколот, моя магия так же была расколота.</color> К счастью я всё ещё чувствую остатки потерянной силы...\n\n<color=yellow>Найди потерянный Сигил глубоко в Катакомбах и привяжи его к своей душе.</color> Как только ты это сделаешь, мы сможем продолжить исследование чего нас ждёт дальше... Я опасаюсь худшего."
"QUEST_COMMUNING_CATACOMBS_NAME": "Резонанс с Катакомбами"
"QUEST_CONSUMED_MADNESS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Зууле в Часовню Старейшин."
"QUEST_CONSUMED_MADNESS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Зууле."
"QUEST_CONSUMED_MADNESS_DESCRIPTION": "<color=yellow>[(УР12-18) Квест Катакомб Святилища]</color>\nКатакомбы Святилища не те которые ты помнил. На самом деле, <color=cyan>истинный заговор Катакомб открыт для нас.</color> Я понимаю что ты пережил многое, но я знаю что ты справишься.\n\nЕдинственный путь не допустить ухудшения Катакомб, <color=yellow>это насытить безумие, победив силы мертвецов в её худшей форме...</color>\n\nПрошу вернись ко мне когда ты справишься, и я награжу тебя."
"QUEST_CONSUMED_MADNESS_NAME": "Поглощённое Безумие"
"QUEST_DENSE_INGOTS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Ру́ке в Святилище."
"QUEST_DENSE_INGOTS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Руке."
"QUEST_DENSE_INGOTS_DESCRIPTION": "Если ты хочешь сделать немного Плотных слитков, так чёрт возьми давай сделаем! <color=yellow>Принеси мне 5 Плотной руды и 3 кусочков Угля!</color>\n\n\n<color=cyan>Ты сможешь найти Плотную руду в Арквудском Перевале, на дороге которая ведёт в Катакомбы Святилища! Здоровенные и плотные камни содержат их!</color>\n"
"QUEST_DENSE_INGOTS_NAME": "Плотные Слитки"
"QUEST_DEVIOUS_PACT_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_DEVIOUS_PACT_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_DEVIOUS_PACT_DESCRIPTION": "Ну ты посмотри-ка на него! Ты что, разве не был занят? <color=cyan>Я собиралась взять тебя в кое-какое дело, которое останется только между нами и еще несколькими!</color>\n\nЯ так понимаю, ты любишь блестящие штучки -- монеты и сокровища? Или сбивать врагов с толку? Я могу помочь те с этим... <color=cyan>Верь мне или нет, Я - Хранитель Бандитов! </color> Мы все работаем на благо нашего дела, <i> даже если методы бывают сомнительны.</i>\n\n<color=yellow> Возьми это, и подумай о вступлении в мою банду! Но помни, ты не сможешь обратить свой выбор. Если ты потеряешь том, возращайся снова!</color>"
"QUEST_DEVIOUS_PACT_NAME": "Коварный Пакт"
"QUEST_DISCIPLE_OF_MAGIC_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_DISCIPLE_OF_MAGIC_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_DISCIPLE_OF_MAGIC_DESCRIPTION": "Ах, вот ты где, малыш! Я заметила что твои умения выросли с первых твоих начал... <color=cyan>может, ты будешь заинтересован в принятии и посвящении науке Мистика?</color>\n\nЕсли ты уверен следовать моему теплу мудрости и наставлениям, <color=yellow>Я подарю тебе том свяжущий мою силу с тобой...</color> И конечно, подумай хорошенько, <color=yellow>ты не сможешь обратить это.</color>\n\nХмм... О-Ох, да! <color=yellow>Если вдруг потеряешь том пока принимаешь решение, пожалуйста поговори со мной что-бы получить новый.</color> "
"QUEST_DISCIPLE_OF_MAGIC_NAME": "Ученик Магии"
"QUEST_DIVA_MUST_DIE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_DIVA_MUST_DIE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_DIVA_MUST_DIE_DESCRIPTION": "Слизни устроили на тебя засаду в Катакомбах? Что ж... <color=cyan>Похоже, среди нас завелась Слайм-Дива!</color>\n\nС сигилом из Катакомб, восстановленным твоей прекрасной душой, <color=yellow>портал, ведущий на Террасу Эффолд, теперь должен быть открыт для тебя.</color>\n\nАх да! Конечно... для каждого восстановленного нами сигила порталы, связанные с ним, снова откроются! <i>Это твоё предназначение, малыш!</i>\n\n<color=cyan>Портал на Террасу Эффолд можно найти у развилки дороги во Внешнем Святилище.</color> Судя по тому, что я вижу на Террасе, она кишит грязными Слаймеками! В отличие от обычных слизней, они уже созрели и куда сильнее...\n\n<color=yellow>Убей 15 Слизеков и одолей их королеву, что покоится в глубине Террасы... Мы должны положить конец её безумию! Когда сделаешь это, возвращайся ко мне в целости и сохранности...</color>\n"
"QUEST_DIVA_MUST_DIE_NAME": "Дива Должна Умереть"
"QUEST_ERADICATING_THE_UNDEAD_COMPLETE_RETURN_MESSAGE": "Вернитесь к Зууле в Часовню Старейшин."
"QUEST_ERADICATING_THE_UNDEAD_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Зууле."
"QUEST_ERADICATING_THE_UNDEAD_DESCRIPTION": "<color=yellow>[(УР12-18) Квест Катакомбы Святилища]</color>\nГотов ли ты очистить Катакомбы от зла, путник? Ты уже сделал для нас так много... Но работы недостаточно, чтобы вернуть истинный покой. Я позабочусь, чтобы твоё участие в этом деле было достойно твоих усилий.\n\n<color=yellow>Отправляйся в Катакомбы Святилища и уничтожь 15 Миазм, 10 Адской слизи и 20 Гейстов. Их можно найти в самых тяжёлых уровнях Катакомб Святилища.</color>\n"
"QUEST_ERADICATING_THE_UNDEAD_NAME": "Искоренение Нежити"
"QUEST_FACING_FOES_COMPLETE_RETURN_MESSAGE": "Вернитесь к Аммагону в Крепость Буларр."
"QUEST_FACING_FOES_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Аммагону."
"QUEST_FACING_FOES_DESCRIPTION": "Эти Меккабаны не то чем они были ранее. Я их даже не узнаю, если не считать оставшихся меховых шуб и плоти которая у них есть. <color=cyan>Они механические, реконструированные абоминации которые необходимо избавить от страданий.</color>\n\nМы должны очистить то что осталось от этой долины, сверху донизу. Все эти Меккабаны должны быть искоренены...\n\n<color=yellow>Принеси мне 15 Голов Гневкабанов, 12 Голов Бумкабанов, и 3 Голов Бойкабанов.</color> Я награжу тебя за твои старания.\n"
"QUEST_FACING_FOES_NAME": "Столкновение с Врагами"
"QUEST_FINDING_AMMAGON_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_FINDING_AMMAGON_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_FINDING_AMMAGON_DESCRIPTION": "<color=cyan>Глубоко в Долине Туул лежит разрушенная цивилизация, заблудший. Раньше это было процветающее королевство, населённое мирной расой, называвшейся „Кабанус“.</color> Они почти вымерли, так как превратились в то, что вы теперь знаете как Меккабаны.\n\n\n<color=cyan>Есть солдат, которого я обучал лично, и он стремится свергнуть Крепость.</color> <color=yellow>Его имя - Аммагон.</color> Я не верю, что у него хватит сил на это в одиночку, но я знаю что есть у тебя. <color=cyan>Аммагон один из последних Кабанусов в этом мире.</color>\n\n<color=yellow>Найди Крепость Буларр, портал которой находится в Анклаве Туул, где бродят Магкабаны. Найди Аммагона, и помоги ему.</color> Иди.\n"
"QUEST_FINDING_AMMAGON_NAME": "Поиск Аммагона"
"QUEST_FOCUSIN_IN_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_FOCUSIN_IN_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_FOCUSIN_IN_DESCRIPTION": "Здаровки! Есть один трюк, которому я могу тебя научить, он довольно крутой! <color=yellow>Держи этот свиток, он даст те силы что-бы противостоять тем тварям.</color>\n\n<color=yellow>Называется Прицельный Выстрел, дорогуша!</color> Главное используй дальнобойное оружие с ним. Требуется время на прицеливание, зато рвёт всё на своем пути!\n\n<color=cyan>Если потерял свиток, остановись у меня и возьми новый! У меня их много!</color>\n\n"
"QUEST_FOCUSIN_IN_NAME": "Фокусировка"
"QUEST_GAME_LOGIC_ACCEPT_QUEST_FORMAT": "Принятых Квестов: {0}."
"QUEST_GATLING_GALIUS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Аммагону в Крепость Буларр."
"QUEST_GATLING_GALIUS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Аммагону."
"QUEST_GATLING_GALIUS_DESCRIPTION": "Если ты готов помочь, у меня к тебе довольно непростая просьба. Это не то, что я смог бы сделать своими силами, а последнее, чего бы мне хотелось - быть изуродованным и превращённым в Меккабана.\n\n<color=cyan>С момента Разлома мира Крепость Буларр претерпела некое... „преображение“. Теперь она служит храмом порочного и больного творения ведьм.</color>\n\n<color=yellow>Внутри, есть три зала в которых обитают одни из самых свирепых Меккабанов долины.</color>\n\n<color=cyan>В самой глубокой камере покоится самый сильный Меккабан, с которым можно столкнуться. Единственное, что осталось от его достоинства, это его имя: „Галиус“.</color>\n\nГалиус когда-то был добрым, чистым и мягкоголосым правителем королевства кабанусов, но теперь он - извращённое воплощение скверны и ненависти.\n\n<color=yellow>Войди в Крепость Буларр и покончи с Галиусом.</color> Вернись ко мне, когда сделаешь это. Верь в себя, хранители Святилища внимательно следят за тобой.\n"
"QUEST_GATLING_GALIUS_NAME": "Гатлинг Галиус"
"QUEST_GHOSTLY_GOODS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_GHOSTLY_GOODS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_GHOSTLY_GOODS_DESCRIPTION": "Знаешь, я могу воспользоваться твоей помощью, если ты не против! <color=cyan>Если ты согласен, я даже открою те один секрет -- но держи ротик на замочке!</color>\n\nЯ ищу специальную комбинацию призрачных штучек, <color=cyan>такое что можно смешать в хорошенький порошочек который делает тебя невидимым!</color> \n\nЕсли сможешь, <color=yellow>принеси мне немного Призрачной пыли с мёртвых ребяток, и горстку тех странных мелких ошейников Гейстов из Катакомб!</color>\n\nВозращайся когда у тебя всего наберется, слышишь?\n\n<color=cyan>Ох! И да, убедись что поговоришь с Анжелой прежде чем отправляться! Она может открыть путь тебе в Катакомбы очень легко!</color>\n"
"QUEST_GHOSTLY_GOODS_NAME": "Призрачные Штучки"
"QUEST_HELL_IN_THE_GROVE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_HELL_IN_THE_GROVE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_HELL_IN_THE_GROVE_DESCRIPTION": "<color=yellow>[(УР20-25) Квест Рощи Полумесяца]</color>\nПодобно Катакомбам Святилища, <color=cyan>Роща Полумесяца явила нам всю свою силу, отражая твои навыки...</color>\n\nБоюсь, что опороченные Обетники-Карбункулы превратились в Рыцарей Смерти, малыш... <color=cyan>Превзойдя магическую мощь, они выковали рунами лезвия, платя своей силой...</color>\n\n<color=yellow>Поторопись в Рощу Полумесяца и очисти её от порчи, пока та не расползлась ещё дальше!</color>\n\n"
"QUEST_HELL_IN_THE_GROVE_NAME": "Пекло в Роще"
"QUEST_HUNTIN_HOGS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_HUNTIN_HOGS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_HUNTIN_HOGS_DESCRIPTION": "Ты выглядишь намного крепче, заблудший. Почему бы нам не попробовать что-нибудь более серьёзное?\n\n<color=cyan>В одной из пещер Внешнего Святилища есть узкий проход,</color> кишащий жалкими существами - Меккабанами. На их головах закреплены губительные копья, и они готовы драться с каждым, кто ступит на их территорию.\n\nМеккабаны предоставляют для нас угрозу -- по крайней мере большую, чем слизни. Чем меньше их останется, тем меньше они будут нас превосходить в числе. \n\n<color=yellow>Прояви своё мастерство: уничтожь 20 Меккабанов и собери 15 их копий.</color>\n\nВернись ко мне, когда исполнишь свой долг.\n"
"QUEST_HUNTIN_HOGS_NAME": "Охота на Кабанов"
"QUEST_KILLING_TOMB_COMPLETE_RETURN_MESSAGE": "Вернитесь к Зууле в Часовню Старейшин."
"QUEST_KILLING_TOMB_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Зууле."
"QUEST_KILLING_TOMB_DESCRIPTION": "<color=yellow>[(УР1-6) Квест Катакомб Святилища]</color>\n<color=cyan>Я прошу тебя спуститься в Катакомбы и усмирить измученную нежить.</color> Чтобы упростить задачу, я прошу тебя начать с Гейстов. <color=yellow>Убей десять Мини-Гейстов и двух обычных Гейстов.</color>\n\nВернись ко мне, когда выполнишь мою просьбу, и я вознагражу тебя... После мы сможем перейти к следующему заданию.\n"
"QUEST_KILLING_TOMB_NAME": "Убийственная Гробница"
"QUEST_MAKIN_A_FIREBREATH_BLADE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_FIREBREATH_BLADE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_FIREBREATH_BLADE_DESCRIPTION": "Хоч сделать что-то новое, дорогуша? У меня есть план для тебя, но придётся немножко поработать!\n\n<color=yellow>В самой тяжёлой части Рощи Полумесяца,</color> есть ингредиенты, которые нам пригодятся для создания сокрушительного клинка! <color=cyan>Он называется Огнедышащий Клинок.</color>\n\nЭти Пасти в тяжёлой роще так окрепли, что у них есть дыхание, способное сжечь твоё маленькое хорошенькое личико! <color=yellow>Принеси мне 12 таких желёз у этих тварей, Зазубренный Клинок и 5 Проклятых свитков!</color>\n\nКак только вернёшься, давай-ка сделаем этот клинок!\n"
"QUEST_MAKIN_A_FIREBREATH_BLADE_NAME": "Создание Огнедышащего Клинка"
"QUEST_MAKIN_A_FOLLYCANNON_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_FOLLYCANNON_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_FOLLYCANNON_DESCRIPTION": "Думаю, у нас тут появилось кое-что классное, чтобы эффектно закончить дела! <color=cyan>Знаешь, к этому мы шли долго, но больше мне уже особо нечего те предложить.</color>\n\nНо! И это большое „но“ -- мы можем собрать ещё одну штуку, которая тебя просто сразит наповал!\n\n<color=yellow>Если ты их ещё не видел, то в глубине Долины Туул, в одной укромной крепости, водится особый вид Меккабанов. Этих парнишек называют Бумкабаны, у которых установлены такие большущие пушкенции на их головах. </color>\n\nКак те идея иметь одну из таких штуковин, чтобы выбивать ей же этих мерзавцев? <i>Давай сделаем оружие, похожее на их, такое, что они не забудут, дорогуша!</i>\n\n<color=yellow>Принеси мне 30 Оборудований Бумкабана, 50 Ногтей Меккабана, и 8 Позвоночников Меккабана! </color> Я знаю, я прошу много, но нам нужно, чтобы эта штука служила тебе до конца времён!\n"
"QUEST_MAKIN_A_FOLLYCANNON_NAME": "Создание Причуднопушки"
"QUEST_MAKIN_A_GOLEM_CHESTPIECE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_GOLEM_CHESTPIECE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_GOLEM_CHESTPIECE_DESCRIPTION": "<color=cyan>Эти големы в Цитадели Полумесяца — жёсткие ребятки!</color> Может, выдёрнем у них Ядра и Самоцветы и сколдуем что-то стоящее! Получится нагрудник, да ещё не абы какой, а очень надёжный!\n\n<color=yellow>Принеси свыше 10 Ядер Големов и 15 Самоцветов -</color> и я те его смастерю!\n"
"QUEST_MAKIN_A_GOLEM_CHESTPIECE_NAME": "Создание Нагрудника Голема"
"QUEST_MAKIN_A_MEKSPEAR_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_MEKSPEAR_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_MEKSPEAR_DESCRIPTION": "Приветик дорогуша! <color=cyan>Я тут думала, что бы нам сделать. Может, что-то вроде мощного копья!</color> Знаешь, у Меккабанов на их маленьких головах такие крепкие копья, что аж страшно смотрятся.\n\nКак насчёт, ты мне дашь... скажем, <color=yellow>1 копьё с Меккабана, и 15 Ядер Слаймека чтобы всё склеить вместе.</color> Я тебе взамен смастерю красивый протазан. Как тебе?\n	"
"QUEST_MAKIN_A_MEKSPEAR_NAME": "Создание Меккопья"
"QUEST_MAKIN_A_MONOLITH_CHESTPIECE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_MONOLITH_CHESTPIECE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_MONOLITH_CHESTPIECE_DESCRIPTION": "<color=cyan>У тебя же еще остался тот нагрудник Голема который мы делали? </color> Позволь сказать, есть способ сделать его <i>еще лучше!</i>\n\n<color=cyan>В Роще Полумесяца водятся более, куда более мощные Големы.</color> Эти ребята настоящая неприятность!\n\nДавай создадим из их материалов крепкий нагрудник! <color=yellow>Принеси мне... Нагрудник Голема, 15 Ядер Монолита, 10 Самоцветов Монолита, и, наконец, 5 Проклятых Записок от Карбункулов в Роще!</color>\n\n<i>Что скажешь?</i>\n"
"QUEST_MAKIN_A_MONOLITH_CHESTPIECE_NAME": "Создание Нагрудника Монолита"
"QUEST_MAKIN_A_RAGESPEAR_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_RAGESPEAR_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_RAGESPEAR_DESCRIPTION": "Хм, ага! Ты делал Меккопьё раньше, я помню! <color=cyan>Хочешь поднять его на новый уровень? Знаешь, мы могли бы...</color>\n\n<color=yellow>Отправляйся в Долину Туул и расправься с Гневкабанами за одно из их копий!</color> Они чуть посильнее, чем те, что ты встречал раньше, так что будь на чеку, дорогуша!\n\n<color=yellow>Ещё мне понадобится Ядра Адской Жижи, около 15 штук, чтобы всё склеить. Их берут у тех самых Адских Жиж в самых тяжёлых уровнях Катакомб Святилища. И не забудь при себе Меккопьё!</color>"
"QUEST_MAKIN_A_RAGESPEAR_NAME": "Создание Гневного Копья"
"QUEST_MAKIN_A_VILE_BLADE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_VILE_BLADE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_VILE_BLADE_DESCRIPTION": "<color=cyan>Ты же был в Цитадели Полумесяца, верно?</color> Последний раз я слышала, там кишат разные мерзенькие тварюшки с дыханием не айс!! Мы не знаем как их называть, <color=cyan>поэтому так и зовём Рты, чтобы было проще.</color>\n\nДавай сделаем что-то, что заставит их почувствовать свой собственный запах! <color=yellow>Принеси мне Грубый Клинок, 5 Горькозубов Рта, 3 Глаз Слаймека, и 10 Ядер Геля Смерти!</color> Сделаем клинок таким же мерзким, как они, дорогуша!\n\n<color=cyan>Грубый Клинок найдёшь в Цитадели Полумесяца, Слаймеков - на Террасе Эффолд, а Гели Смерти - в обычных Катакомбах Святилища!</color>\n\n"
"QUEST_MAKIN_A_VILE_BLADE_NAME": "Создание Мерзкого Клинка"
"QUEST_MAKIN_A_WIZWAND_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_A_WIZWAND_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_A_WIZWAND_DESCRIPTION": "<color=cyan>Видал когда-нибудь этих странных Магкабанов, дорогуша?</color> Такие довольные на вид - но поверь, злющие они, ещё какие!\n\nМожет, мы соорудим скипетр поменьше, попроще, но с таким же эффектом, как у них, а? <color=yellow>Принеси ка мне 1 Скипетр Магкабана, 5 Ветвей Жародрева и 5 Бревен Жраводрева!</color> Справишься?\n"
"QUEST_MAKIN_A_WIZWAND_NAME": "Создание Волшепалочки"
"QUEST_MAKIN_MORE_FOLLYCANNONS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_MORE_FOLLYCANNONS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_MORE_FOLLYCANNONS_DESCRIPTION": "<color=cyan>Дорогуша, ты что, потерял свою Причуднопушку??</color> <i>Или продал её?</i> Ну, не суть, мы можем сделать еще одну, но это потребует тех же усилий, что и в прошлый раз! Только без фокусов, лады?\n\n<color=yellow>Принеси мне 30 Оборудований Бумкабана, 50 Ногтей Меккабана, 15 Мешочков Бумкабана, и 8 Позвоночников Меккабана!</color> Я знаю, я прошу много, но нам нужно, чтобы эта штука служила тебе до конца времён!\n"
"QUEST_MAKIN_MORE_FOLLYCANNONS_NAME": "Создать Больше Причуднопушек!"
"QUEST_MAKIN_MORE_MEKSPEARS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_MORE_MEKSPEARS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_MORE_MEKSPEARS_DESCRIPTION": "<color=cyan>Хочешь сделать ещё одно Меккопьё?</color> Ну, тогда ладненько!\n\nТы знаешь что делать! Мне нужно... <color=yellow>1 копьё от Меккабанов и 15 ядер Слаймеков что-бы всё сработалось,</color> и я сделаю тебе отличный протазан в обмен. Идёт?\n"
"QUEST_MAKIN_MORE_MEKSPEARS_NAME": "Создать Больше Меккопий!"
"QUEST_MAKIN_MORE_RAGESPEARS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_MORE_RAGESPEARS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_MORE_RAGESPEARS_DESCRIPTION": "<color=cyan>Хочешь сделать еще одно Гневное Копьё, дорогуша?</color> Ладненько! Вот что нам потребуется:\n\n<color=yellow>1 Меккопьё, 1 Гневкопьё, и 15 ядер Адских слизней!</color>\n\n<color=cyan>Ты можешь найти Гневкабанов в Туулской Долине, а Адских слизней в самых тяжёлых Катакомбах Святилища.</color> Удачи!"
"QUEST_MAKIN_MORE_RAGESPEARS_NAME": "Создать Больше Гневкопий!"
"QUEST_MAKIN_MORE_VILE_BLADES_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_MORE_VILE_BLADES_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_MORE_VILE_BLADES_DESCRIPTION": "<color=cyan>Готов сделать ещё один Мерзкий Клинок?</color> Отлично!\n\n<color=yellow>Принеси мне Грубый Клинок, 5 Горькозубов Рта, 3 Глаза Слаймеков, и 10 ядер Гелей смерти!</color>\n\n<color=cyan>Грубый Клинок найдёшь в Цитадели Полумесяца, Слаймеки водятся на Террасе Эффолда, а Гели смерти — в обычных Катакомбах Святилища!</color>\n\n"
"QUEST_MAKIN_MORE_VILE_BLADES_NAME": "Создать Больше Мерзких Клинков!"
"QUEST_MAKIN_MORE_WIZWANDS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MAKIN_MORE_WIZWANDS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MAKIN_MORE_WIZWANDS_DESCRIPTION": "<color=cyan>Заинтересован в создании еще одной Волшепалочки??</color> Без проблем! Нам понадобится тот же набор ингредиентов, <i>про-осто</i> что б ты знал.\n\n<color=yellow>Принеси мне 1 Скипетр Магкабана, 5 Ветвей Жародрева и 5 Бревён Жародрева!</color> И я всё для тебя приготовлю.\n\n"
"QUEST_MAKIN_MORE_WIZWANDS_NAME": "Создать Больше Волшепалочек!"
"QUEST_MASTERY_OF_DEXTERITY_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_MASTERY_OF_DEXTERITY_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_MASTERY_OF_DEXTERITY_DESCRIPTION": "Хм! Кто бы мог подумать? Я и не думала, что буду предлагать такое, но держи. \n\nДавно в прошлом я постоянно билась за контроль своих делишек, следя, чтобы всё шло как надо. <color=cyan> В те времена я использовала особые приёмы с кастетами, луками и пушками!</color> Острые и точные штуки, способные вмиг расправиться с конкуренцией!\n\nЕсли заинтересован освоить часть этих навыков, я могу научить тя! <color=yellow>Возьми этот свиток. Он даст тебе нужный заряд, чтобы разбить этих мелких тварей в прах!</color>\n\n<color=yellow>Если передумаешь, Я всегда могу дать те ещё один свиток! Только учти, что свиток исчезнет, если ты его уронишь, слышал?</color>"
"QUEST_MASTERY_OF_DEXTERITY_NAME": "Мастерство Ловкости"
"QUEST_MASTERY_OF_MIND_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_MASTERY_OF_MIND_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_MASTERY_OF_MIND_DESCRIPTION": "После многих лет интенсивных исследований, <color=cyan>я раскрыла секреты использования оружия Разума!</color> Малыш, было бы тебе тоже интересно научиться этому? <color=yellow>Если да, я могу дать тебе этот свиток умения.</color> \n\n\n<color=cyan>Используй его, и ты поймёшь, как отточить свой разум для подобных орудий...</color>\n\n<color=yellow>Ох, ах да, если передумаешь, возращайся ко мне, и я могу предоставить сколько угодно свитков... Имей в виду, свиток исчезнет если ты его потеряешь.</color>\n"
"QUEST_MASTERY_OF_MIND_NAME": "Мастерство Разума"
"QUEST_MASTERY_OF_STRENGTH_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_MASTERY_OF_STRENGTH_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_MASTERY_OF_STRENGTH_DESCRIPTION": "<color=cyan>Чтобы справиться с оружием, полагающимся на силу, нужны подходящая мощь и решимость, заблудший.</color> Я вижу, у тебя есть потенциал в их использовании. <color=yellow>Если ты готов взвалить на себя бремя войны, возьми этот свиток.</color> <color=cyan>Прочтение его научит тебя всему, что нужно знать для сокрушения врагов в кровавые куски.</color>\n\n<color=yellow>Возвращайся ко мне в любое время, если передумаешь в своем выборе. Я дам тебе столько свитков, сколько нужно. Помни, что свиток исчезнет, если ты его потеряешь.</color>"
"QUEST_MASTERY_OF_STRENGTH_NAME": "Мастерство Силы"
"QUEST_MENU_CELL_REWARD_HEADER": "Награды :"
"QUEST_MENU_CELL_SLOT_EMPTY": "Пустой Слот"
"QUEST_MENU_HEADER_UNSELECTED": "Выберите Квест."
"QUEST_MENU_SUMMARY_NO_QUESTS": "Нет Квестов в Журнале."
"QUEST_NIGHT_SPIRITS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_NIGHT_SPIRITS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_NIGHT_SPIRITS_DESCRIPTION": "<color=cyan>По ночам,</color> блуждающие Огоньки из близлежащих Катакомб беспокоят Внешнее Святилище. Некоторые Большие Огоньки могут встречаться глубже в самих Катакомбах.\n\n<color=yellow>Истреби 8 Младших Огоньков и 5 Больших Огоньков.</color>\nБудь осторожен, ведь <color=cyan>блуждающие Огоньки могут проклясть тебя.</color> Возвращайся ко мне, когда у тебя руки будут полны крови нежити."
"QUEST_NIGHT_SPIRITS_NAME": "Ночные Духи"
"QUEST_NULVERSA_GREENVERSA_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_NULVERSA_GREENVERSA_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_NULVERSA_GREENVERSA_DESCRIPTION": "Я, может, и специалист по оружию и броне, но немного модой тоже занимаюсь! <color=cyan>У тебя есть Пустоборотный Плащ, дорогуша?</color>\n\n<color=yellow>Если нет, то его ты можешь найти в тяжёлой Рощи Полумесяца.</color> Принеси один, и мы сможем сделать его крепче с помощью моих сил!\n\n<color=yellow>Принеси мне Пустоборотный Плащ, 5 Камней Проворства и 8 Лозашипников!</color> Мы превратим этот пустой плащик во что-то грозное!\n"
"QUEST_NULVERSA_GREENVERSA_NAME": "Пустоборотно, Зелёноворотно!"
"QUEST_NULVERSA_MAGICA_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_NULVERSA_MAGICA_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_NULVERSA_MAGICA_DESCRIPTION": "Ах, как приятно видеть тебя снова, малыш... Я наблюдала за твоим ростом в этом мире - и это зрелище достойно восхищения.\n\nВозможно, тебе это покажется странным заданием, <color=cyan>но я ищу способ ещё сильнее помочь тебе в бою...</color> <color=yellow>В самой тяжёлой части Рощи Полумесяца есть магический плащ, в который я могу наполнить свои силы.</color>\n\nДа, как на пустом холсте, возможностей много. <color=yellow>Принеси мне Пустоборотный Плащ, 5 Камней Потока и 8 Потокопапоротников...</color> \n\nВыполнив это, я смогу сделать плащ насыщенный магической силой...\n"
"QUEST_NULVERSA_MAGICA_NAME": "Пустоборотная Магика"
"QUEST_NULVERSA_VISCERA_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_NULVERSA_VISCERA_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_NULVERSA_VISCERA_DESCRIPTION": "<color=cyan>Есть плащ спрятанный в тяжёлой Рощи Полумесяца, который ты можешь найти, заблудший.</color>\n\nИзыщи его, и я смогу превратить его в гораздо более мощную, доблестную вещь. Он будет напоминать кровь наших врагов, чтобы они дрожали, видя, как ты приближаешься.\n\n<color=yellow>Собери Пустоборотный Плащ, 5 Камней Мощи и 8 Жароцветов.</color> Затем я начну ритуал, и ты уйдёшь отсюда с большей силой.\n"
"QUEST_NULVERSA_VISCERA_NAME": "Пустоборотные Потроха"
"QUEST_PURGING_THE_GROVE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_PURGING_THE_GROVE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_PURGING_THE_GROVE_DESCRIPTION": "<color=yellow>[(УР15-20) Квест Рощи Полумесяца]</color>\n<color=cyan>Роща Полумесяца несёт зло в этот мир.</color> Существа, что кишат там, не соответствуют нашим стандартам, заблудший. Заставь их умолкнуть, покарав и упокоив их осквернённые души.\n\n<color=yellow>Уничтожь 20 Мёртводрев, 10 Карбункулов, 10 Красных и Синих Минчгрибов, и 15 Монолитов.</color> Немедленно вернись ко мне после выполнения задания.\n"
"QUEST_PURGING_THE_GROVE_NAME": "Зачистка Рощи"
"QUEST_PURGING_THE_UNDEAD_COMPLETE_RETURN_MESSAGE": "Вернитесь к Зууле в Часовню Старейшин."
"QUEST_PURGING_THE_UNDEAD_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Зууле."
"QUEST_PURGING_THE_UNDEAD_DESCRIPTION": "<color=yellow>[(УР6-12) Квест Катакомб Святилища]</color>\nПолагаю, ты готов оказать мне дальнейшую помощь в этом задании, путник. Если так, многие из нежити в Катакомбах должны быть упокоены.\n\n<color=yellow>Войди в Катакомбы и уничтожь 15 Токсинов, 10 Смертельгелей, and 20 Гейстов.</color> Как только выполнишь это, вернись ко мне - и я вознагражу тебя за ценную помощь...\n"
"QUEST_PURGING_THE_UNDEAD_NAME": "Искоренение Нежити"
"QUEST_RATTLECAGE_RAGE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Зууле в Часовню Старейшин."
"QUEST_RATTLECAGE_RAGE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Зууле."
"QUEST_RATTLECAGE_RAGE_DESCRIPTION": "<color=yellow>[(УР6-12) Квест Катакомб Святилища]</color>\nПонимаю, Катакомбы могли показаться тебе непростыми. Ох...? Нет? Ну... вдруг ты не знал, но Катакомбы меняют свой облик при каждом входе. <color=cyan>Портал, ведущий в них, осквернён - он постоянно искажает происходящее внутри.</color>\n\n<color=yellow>Очисти Катакомбы от зла, от начала и до конца.</color> Вернись ко мне, когда завершишь это задание."
"QUEST_RATTLECAGE_RAGE_NAME": "Ярость Грохучей Клетки"
"QUEST_RETRIEVED_QUEST_OBJECTIVE_ITEM_FORMAT": "Получен предмет задания: {0}."
"QUEST_REVILING_MORE_RAGEBOARS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Аммагону в Крепость Буларр."
"QUEST_REVILING_MORE_RAGEBOARS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Аммагону."
"QUEST_REVILING_MORE_RAGEBOARS_DESCRIPTION": "<color=cyan>Гневкабаны всё ещё стекаются толпами.</color> Я вижу - они постоянно в муках и стонут, прося избавления от своих страданий. Я желаю лишь чтобы им снова дали покой.\n\n<color=yellow>Убей ещё 20 Гневкабанов.</color> Учти: глубины Крепости могут оказаться смертельными, если ты не будешь осторожен.\n"
"QUEST_REVILING_MORE_RAGEBOARS_NAME": "Неодобрение Гневкабанов"
"QUEST_REVILING_THE_RAGEBOARS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_REVILING_THE_RAGEBOARS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Аммагону."
"QUEST_REVILING_THE_RAGEBOARS_DESCRIPTION": "<color=cyan>Гневкабаны свирепые твари... Будь осторожен с ними, они куда сильнее обычных Меккабанов.</color> Мне больно видеть, как собратья Кабанусы превращаются в таких мерзких созданий.\n\n<color=cyan>Стоит войти на территорию крепости Буларр, и она уже кишит этими чёртовыми существами.</color> Никто не знает, насколько мучителен и травматичен процесс превращения в Гневкабана, но, пожалуй, лучше не искать ответов на этот вопрос.\n\n<color=yellow>Убей 20 Гневкабанов.</color> Имей в виду: если зайдёшь слишком глубоко в крепость, это может стоить тебе жизни если будешь не осторожен.\n"
"QUEST_REVILING_THE_RAGEBOARS_NAME": "Поругание Гневкабанов"
"QUEST_RIDDING_SLIMES_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_RIDDING_SLIMES_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_RIDDING_SLIMES_DESCRIPTION": "Слизни создают немало проблем вокруг Святилища. Избавление от них сильно нам поможет избежать дальнейших осложнений.\n\n<color=cyan>Слизни чаще всего встречаются днём. </color> <color=yellow>Убей 10 Слизней, и собери с них 5 Ядер Слизня и 5 Ушей Слизня.</color> Ядра и уши пригодятся мне как клей для починки моего сломанного оружия. Теперь ступай, заблудший.\n"
"QUEST_RIDDING_SLIMES_NAME": "Избавление от Слизней"
"QUEST_SAPPHITE_INGOTS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Ру́ке в Святилище."
"QUEST_SAPPHITE_INGOTS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Руке."
"QUEST_SAPPHITE_INGOTS_DESCRIPTION": "Если ты хочешь сделать немного Сапфитовых слитков, так чёрт возьми давай сделаем! <color=yellow>Принеси мне 5 Сапфитовой руды, 5 Медных Скоплений, и 3 Железных Скоплений!</color>\n\n\n<color=cyan>Руду сапфита можно найти в Анклаве Туул. Будь очень осторожен, дружище!! Там полно опасных монстров!</color>\n"
"QUEST_SAPPHITE_INGOTS_NAME": "Слитки Сапфита"
