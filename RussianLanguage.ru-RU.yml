"_DIALOG_AMMAGON_BRANCH_0_DIALOG_0_INPUT": ""
"_DIALOG_AMMAGON_BRANCH_0_DIALOG_0_INPUT_ALT_0": "Готов ли ты положить конец мукам, которые терпят мои друзья?"
"_DIALOG_AMMAGON_BRANCH_0_DIALOG_0_INPUT_ALT_1": "Мои друзья просят твоей помощи, путник, чтобы положить конец их страданиям."
"_DIALOG_AMMAGON_BRANCH_0_DIALOG_0_INPUT_ALT_2": "Любой ценой, мы возьмём эту крепость."
"_DIALOG_AMMAGON_BRANCH_0_DIALOG_0_SELECTION_0": "Пока."
"_DIALOG_AMMAGON_BRANCH_0_DIALOG_0_SELECTION_1": "Где мы?"
"_DIALOG_AMMAGON_BRANCH_0_DIALOG_0_SELECTION_2": "Я помогу."
"_DIALOG_AMMAGON_BRANCH_1_DIALOG_0_INPUT": "У меня есть кое-что на примете."
"_DIALOG_AMMAGON_BRANCH_1_DIALOG_0_SELECTION_0": "Пока."
"_DIALOG_AMMAGON_BRANCH_2_DIALOG_0_INPUT": "За воротами впереди, находится Крепость Буларр."
"_DIALOG_AMMAGON_BRANCH_2_DIALOG_1_INPUT": "Это было процветающее королевство нашего народа, но незадолго до разлома мира появилась злая ведьма."
"_DIALOG_AMMAGON_BRANCH_2_DIALOG_2_INPUT": "Ведьма творила мерзкие деяния тёмной магии, подобных которым мы никогда не видели в своей жизни."
"_DIALOG_AMMAGON_BRANCH_2_DIALOG_3_INPUT": "Не успев оглянуться, окружающие меня товарищи превратились в первобытных, звероподобных монстров с огромными орудиями на головах."
"_DIALOG_AMMAGON_BRANCH_2_DIALOG_4_INPUT": "К счастью, мне удалось ускользнуть из её лап и скрыться, пока она продолжала своё творение над моими собратьями."
"_DIALOG_AMMAGON_BRANCH_2_DIALOG_5_INPUT": "Возможно, я единственный, кого она пощадила. Но, быть может, где-то ещё остался другой Кабанус."
"_DIALOG_AMMAGON_BRANCH_2_DIALOG_6_INPUT": "Меня больше интересует очистить это место и сократить число этих созданий. Ради их же покоя."
"_DIALOG_AMMAGON_INTRODUCTION_BRANCH_0_DIALOG_0_INPUT": "Кто ты и что тебе нужно?"
"_DIALOG_AMMAGON_INTRODUCTION_BRANCH_0_DIALOG_1_INPUT": "...Понимаю. Ты не из этого мира."
"_DIALOG_AMMAGON_INTRODUCTION_BRANCH_0_DIALOG_2_INPUT": "Слушай, у меня мало времени на любезности. Как ты, возможно, знаешь, это место кишит чудовищами."
"_DIALOG_AMMAGON_INTRODUCTION_BRANCH_0_DIALOG_3_INPUT": "Эти „Меккабаны“ когда-то были моими братьями, но теперь они машины смерти, движимые кровожадностью."
"_DIALOG_AMMAGON_INTRODUCTION_BRANCH_0_DIALOG_4_INPUT": "Полагаю, ты встречался с Эноком, да? Он знает, чем стало это место. Я многому у него научился."
"_DIALOG_AMMAGON_INTRODUCTION_BRANCH_0_DIALOG_5_INPUT": "Если хочешь помочь, мы можем вместе усмирить это проклятое место. Я не вынесу, чтобы моё королевство было захвачено этим злом."
"_DIALOG_AMMAGON_INTRODUCTION_BRANCH_0_DIALOG_5_SELECTION_0": "Пока."
"_DIALOG_AMMAGON_NAME_TAG": "Аммагон"
"_DIALOG_AMMAGON_QUEST_ACCEPT_RESPONSE_0": "Береги себя."
"_DIALOG_AMMAGON_QUEST_ACCEPT_RESPONSE_1": "Это будет испытание, так что будь готов."
"_DIALOG_AMMAGON_QUEST_ACCEPT_RESPONSE_2": "Пусть сила Энока принесёт тебе победу"
"_DIALOG_AMMAGON_QUEST_COMPLETE_RESPONSE_0": "Передай Эноку мою благодарность за то, что он привёл талантливого воина, чтобы помочь в моей борьбе."
"_DIALOG_AMMAGON_QUEST_COMPLETE_RESPONSE_1": "Спасибо, путник. Мне теперь станет немного спокойнее этой ночью."
"_DIALOG_AMMAGON_QUEST_COMPLETE_RESPONSE_2": "Кабанусы благодарят тебя за оказанную помощь."
"_DIALOG_AMMAGON_QUEST_COMPLETE_RESPONSE_3": "Приношу тебе мою глубокую благодарность."
