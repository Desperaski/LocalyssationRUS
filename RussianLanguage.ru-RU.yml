"ITEM_TOME_OF_THE_BANDIT_DESCRIPTION": "<color=lime>Может быть использовано только в Безопасной Зоне.</color>\n\nПрочитав этот том, вы научитесь быть классом <color=lime>проворного Бандита.</color> Кроме того, ваши Очки Умений будут сброшены и восстановлены. Необратимо."
"ITEM_TOME_OF_THE_BANDIT_NAME": "Том Бандита"
"ITEM_TOME_OF_THE_BANDIT_NAME_PLURAL": "Тома Бандита"
"ITEM_TOME_OF_THE_BISHOP_DESCRIPTION": "<color=lime>Может быть использовано только в Безопасной Зоне.</color>\n\nТребуется ур. 28 Мистика.\n\nКласс святого мага, ориентированный на поддержку и нанесение урона. Имеет умения, которые могут как наносить урон, так и исцелять союзников. Будет обладать способностями для снятия негативных эффектов с себя и союзников, а также исцеляющими эффектами с течением времени.\n\n==В разработке. Книга умений не завершена.=="
"ITEM_TOME_OF_THE_BISHOP_NAME": "Том Епископа"
"ITEM_TOME_OF_THE_BISHOP_NAME_PLURAL": "Тома Епископа"
"ITEM_TOME_OF_THE_FIGHTER_DESCRIPTION": "<color=lime>Может быть использовано только в Безопасной Зоне.</color>\n\nПрочитав этот том, вы научитесь быть классом <color=red>свирепого Воина.</color> Кроме того, ваши Очки Умений будут сброшены и восстановлены. Необратимо."
"ITEM_TOME_OF_THE_FIGHTER_NAME": "Том Воина"
"ITEM_TOME_OF_THE_FIGHTER_NAME_PLURAL": "Тома Воина"
"ITEM_TOME_OF_THE_MAGUS_DESCRIPTION": "<color=lime>Можно использовать только в Безопасной Зоне.</color>\n\nТребуется ур. 28 Мистика.\n\nКласс в колдунском духе, который фокусируется на магии тьмы, огня и воды. Будет иметь возможность призывать фамильяра, вызывать страх, применять несколько умений областного действия, высасывать ману и накладывать умения, наносящие урон со временем по врагам.\n\n==В разработке. Книга умений не завершена.=="
"ITEM_TOME_OF_THE_MAGUS_NAME": "Том Магуса"
"ITEM_TOME_OF_THE_MAGUS_NAME_PLURAL": "Тома Магуса"
"ITEM_TOME_OF_THE_MYSTIC_DESCRIPTION": "<color=lime>Можно использовать только в Безопасной Зоне.</color>\n\nПрочитав этот том, вы научитесь быть классом <color=cyan>мудрого Мистика.</color> Кроме того, ваши Очки Умений будут сброшены и восстановлены. Необратимо."
