"DIALOGDATA_VIVIAN_BRANCH_2_DIALOG_0_SELECTION_3": "Зачарование?"
"DIALOGDATA_VIVIAN_BRANCH_2_DIALOG_0_SELECTION_4": "Скалирование?"
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_0_INPUT": "Окей, вот как работает зачарование."
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_1_INPUT": "Ты даёшь мне часть своего снаряжения. Оружие или броня сойдёт."
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_2_INPUT": "В зависимости от снаряжения, это будет стоить корон. Редкие предметы требуют предметы для зачарования."
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_3_INPUT": "Только убедись, что снаряжение не из разряда формально экзотического, я не могу чарить такое."
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_4_INPUT": "Зачарование - процесс деликатный, и почти невозможно заранее выбрать то, что хочешь."
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_5_INPUT": "Из-за этого каждый раз будет выпадать случайное зачарование."
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_6_INPUT": "Я надеюсь ты всё понял. Я не хочу рассказывать тебе всё сначала."
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_6_SELECTION_0": "Спасибо, удачи!"
"DIALOGDATA_VIVIAN_BRANCH_3_DIALOG_6_SELECTION_1": "Я зачарую кое-что."
"DIALOGDATA_VIVIAN_BRANCH_4_DIALOG_0_INPUT": ""
"DIALOGDATA_VIVIAN_BRANCH_4_DIALOG_0_INPUT_ALT_0": "Ух, заткнись..."
"DIALOGDATA_VIVIAN_BRANCH_4_DIALOG_0_INPUT_ALT_1": "Ага, это не вопрос."
"DIALOGDATA_VIVIAN_BRANCH_4_DIALOG_0_INPUT_ALT_2": "Ты уверен? Может ты не будешь говорить это после того как я врежу тебе в лицо."
"DIALOGDATA_VIVIAN_BRANCH_4_DIALOG_0_INPUT_ALT_3": "Ты знаешь, лучше оставлять некоторые вещи при себе."
"DIALOGDATA_VIVIAN_BRANCH_4_DIALOG_0_INPUT_ALT_4": "Держи это при себе, дружок."
"DIALOGDATA_VIVIAN_BRANCH_5_DIALOG_0_INPUT": "Ага, я ученица Анжелы, Мистик. Часть её исследований и учёбы."
"DIALOGDATA_VIVIAN_BRANCH_5_DIALOG_1_INPUT": "Я решила сосредоточиться на изучении зачарований, а не атакующей магии."
"DIALOGDATA_VIVIAN_BRANCH_5_DIALOG_2_INPUT": "Думаю, это спокойнее. И неплохо платят, если всё идёт хорошо."
"DIALOGDATA_VIVIAN_BRANCH_5_DIALOG_3_INPUT": "Я уважаю Анжелу. Если бы не она, меня бы здесь не было. Тебе тоже стоит уважать её."
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_0_INPUT": "Лады. Итак, если поместить оружие в слот зачарования, можно изменить его шкалу урона."
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_1_INPUT": "В зависимости от того, какую штуку ты хочешь сделать, понадобятся специальные камни."
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_2_INPUT": "Для Силы нужны Камни Мощи."
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_3_INPUT": "Ловкость требует Камни Проворства."
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_4_INPUT": "И, наконец, Разум требует Камни Потока. Понял? В любом случае..."
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_5_INPUT": "Если оружие уже наследует нужной шкале, камни не потребуются. Круто, да?"
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_6_INPUT": "Камни можно найти повсюду в мире, но они так же могут быть куплены у торговцев."
"DIALOGDATA_VIVIAN_BRANCH_6_DIALOG_7_INPUT": "Камни дорогие, так что я не стала на тебе экономить и добавила немного к стоимости. Так что... пожалуйста."
"DIALOGDATA_VIVIAN_INTRODUCTION_BRANCH_0_DIALOG_0_INPUT": "Хм? О, хай. Чё как?"
"DIALOGDATA_VIVIAN_INTRODUCTION_BRANCH_0_DIALOG_1_INPUT": "Я - Вивиан, ученица Анжелы."
"DIALOGDATA_VIVIAN_INTRODUCTION_BRANCH_0_DIALOG_2_INPUT": "Моя специальность - зачарование оружия и брони."
"DIALOGDATA_VIVIAN_INTRODUCTION_BRANCH_0_DIALOG_3_INPUT": "Если у тебя есть немного баблишка, я, вероятно, смогу тебе помочь. Просто хорошенько попроси."
"DIALOGDATA_VIVIAN_INTRODUCTION_BRANCH_0_DIALOG_4_INPUT": "Тааак... чего ты хотел? Заинтересован в моих услугах?"
"DIALOGDATA_VIVIAN_INTRODUCTION_BRANCH_0_DIALOG_4_SELECTION_0": "Возможно позже."
"DIALOGDATA_VIVIAN_INTRODUCTION_BRANCH_0_DIALOG_4_SELECTION_1": "Ещё бы!"
"DIALOGDATA_VIVIAN_NAME_TAG": "Вивиан"
"DIALOGDATA_VIVIAN_SHOPKEEP_RESPONSE_0": "Сколько еще раз мы будем это делать?"
"DIALOGDATA_VIVIAN_SHOPKEEP_RESPONSE_1": "Что получаешь, то и получаешь.."
"DIALOGDATA_VIVIAN_SHOPKEEP_RESPONSE_2": "Оно не выглядит настолько ужасным, как мне кажется."
"DIALOGDATA_VIVIAN_SHOPKEEP_RESPONSE_3": "Как говорится, решай сам."
"DIALOGDATA_VIVIAN_SHOPKEEP_RESPONSE_4": "Хм, не думала что так всё выйдет."
"DIALOGDATA_ZUULA_BRANCH_0_DIALOG_0_INPUT": ""
"DIALOGDATA_ZUULA_BRANCH_0_DIALOG_0_INPUT_ALT_0": "Ты пришёл чтобы помочь покою этой Часовни?"
"DIALOGDATA_ZUULA_BRANCH_0_DIALOG_0_INPUT_ALT_1": "Нужно сделать многое, а времени так мало..."
"DIALOGDATA_ZUULA_BRANCH_0_DIALOG_0_INPUT_ALT_2": "Катакомбы должны быть очищены..."
"DIALOGDATA_ZUULA_BRANCH_0_DIALOG_0_SELECTION_0": "Не сейчас."
"DIALOGDATA_ZUULA_BRANCH_0_DIALOG_0_SELECTION_1": "Есть Квесты?"
"DIALOGDATA_ZUULA_BRANCH_1_DIALOG_0_INPUT": ""
"DIALOGDATA_ZUULA_BRANCH_1_DIALOG_0_INPUT_ALT_0": "Я так устала..."
"DIALOGDATA_ZUULA_BRANCH_1_DIALOG_0_INPUT_ALT_1": "У меня для тебя есть несколько поручений..."
"DIALOGDATA_ZUULA_BRANCH_1_DIALOG_0_INPUT_ALT_2": "Однажды мы все обретём покой..."
"DIALOGDATA_ZUULA_BRANCH_1_DIALOG_0_INPUT_ALT_3": "Тирании скоро придёт конец..."
"DIALOGDATA_ZUULA_BRANCH_1_DIALOG_0_SELECTION_0": "Прощай."
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_0_INPUT": "Приветствую тебя, путник..."
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_1_INPUT": "Я - Зуула, бывшая жрица Святилища, задолго до Раскола мира."
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_2_INPUT": "Услышь мою мольбу..."
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_3_INPUT": "Я почти мертва, но священная земля этой часовни не дает безумию поглотить меня."
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_4_INPUT": "Если готов помочь моему делу и унять мои тревоги, и упокоить неконтролируемую нежить, есть поручения, чтобы усмирить зло внутри."
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_5_INPUT": "Ты мне поможешь?"
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_5_SELECTION_0": "В другой раз."
"DIALOGDATA_ZUULA_INTRODUCTION_BRANCH_0_DIALOG_5_SELECTION_1": "Есть Квесты?"
"DIALOGDATA_ZUULA_NAME_TAG": "Зуула"
"DIALOGDATA_ZUULA_QUEST_ACCEPT_RESPONSE_0": "Я знаю ты справишься с этим заданием, путник."
"DIALOGDATA_ZUULA_QUEST_ACCEPT_RESPONSE_1": "Мы заставим мертвых упокоиться, раз и навсегда."
"DIALOGDATA_ZUULA_QUEST_ACCEPT_RESPONSE_2": "Пришло время положить конец его проклятию...."
"DIALOGDATA_ZUULA_QUEST_ACCEPT_RESPONSE_3": "Ты сможешь это сделать... Я знаю, ты сможешь."
"DIALOGDATA_ZUULA_QUEST_COMPLETE_RESPONSE_0": "Ещё один день спокойствия, для всех нас."
"DIALOGDATA_ZUULA_QUEST_COMPLETE_RESPONSE_1": "Часовня снова в безопасности..."
"DIALOGDATA_ZUULA_QUEST_COMPLETE_RESPONSE_2": "Я никогда не забуду, что ты для нас сделал...."
