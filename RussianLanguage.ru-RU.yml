"DIALOGDATA_ENOK_BRANCH_0_DIALOG_0_SELECTION_1": "Я хочу узнать..."
"DIALOGDATA_ENOK_BRANCH_0_DIALOG_0_SELECTION_2": "Есть Квесты?"
