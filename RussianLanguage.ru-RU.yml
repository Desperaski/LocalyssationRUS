"DIALOGDATA_ENOK_BRANCH_1_DIALOG_0_INPUT_ALT_2": "Ни один вопрос не останется без ответа."
"DIALOGDATA_ENOK_BRANCH_1_DIALOG_0_INPUT_ALT_3": "Давай послушаем."
"DIALOGDATA_ENOK_BRANCH_1_DIALOG_0_SELECTION_0": "Впрочем..."
"DIALOGDATA_ENOK_BRANCH_1_DIALOG_0_SELECTION_1": "Кто ты?"
"DIALOGDATA_ENOK_BRANCH_1_DIALOG_0_SELECTION_2": "Кто такой Воин?"
"DIALOGDATA_ENOK_BRANCH_1_DIALOG_0_SELECTION_3": "Парирование?"
"DIALOGDATA_ENOK_BRANCH_1_DIALOG_0_SELECTION_4": "Сопротивления?"
"DIALOGDATA_ENOK_BRANCH_2_DIALOG_0_INPUT": "Я - Энок, Хранитель Воинов. Я - ярость света, возвестник ада против тьмы."
"DIALOGDATA_ENOK_BRANCH_2_DIALOG_1_INPUT": "Полагаю, ты новичок в этом мире. Ты прибыл поздно, в эпоху, когда он погрузился в порчу."
"DIALOGDATA_ENOK_BRANCH_2_DIALOG_2_INPUT": "Моя мощь даруют силу и жизненную энергию душам, стремящимся доказать свою ценность."
"DIALOGDATA_ENOK_BRANCH_2_DIALOG_3_INPUT": "Я чувствую в тебе искру решимости. Поддайся страху - и ты потерпишь поражение."
"DIALOGDATA_ENOK_BRANCH_2_DIALOG_3_SELECTION_0": "До свидания."
"DIALOGDATA_ENOK_BRANCH_2_DIALOG_3_SELECTION_1": "Ещё кое-что..."
"DIALOGDATA_ENOK_BRANCH_3_DIALOG_0_INPUT": "Потерянная душа обретает свирепость Воина, как только она докажет свою достаточную силу."
"DIALOGDATA_ENOK_BRANCH_3_DIALOG_1_INPUT": "Воин может разрывать плоть врагов, ослабляя их кровопролитием."
"DIALOGDATA_ENOK_BRANCH_3_DIALOG_2_INPUT": "Воин может сокрушать врагов вокруг мощным ударом по земле или смертоносным выпадом издалека."
"DIALOGDATA_ENOK_BRANCH_3_DIALOG_3_INPUT": "Чтобы постичь искусство боя, требуется высочайшая концентрация."
"DIALOGDATA_ENOK_BRANCH_3_DIALOG_4_INPUT": "Если у тебя есть всё необходимое, вернись ко мне и я научу тебя."
"DIALOGDATA_ENOK_BRANCH_3_DIALOG_4_SELECTION_0": "Прощай."
"DIALOGDATA_ENOK_BRANCH_3_DIALOG_4_SELECTION_1": "Понятно..."
"DIALOGDATA_ENOK_BRANCH_4_DIALOG_0_INPUT": ""
"DIALOGDATA_ENOK_BRANCH_4_DIALOG_0_INPUT_ALT_0": "Есть дела, которые нужно уладить."
"DIALOGDATA_ENOK_BRANCH_4_DIALOG_0_INPUT_ALT_1": "Проверим, справишься ли ты с этим заданием."
"DIALOGDATA_ENOK_BRANCH_4_DIALOG_0_INPUT_ALT_2": "Сегодня отличный день для кровопролития."
"DIALOGDATA_ENOK_BRANCH_4_DIALOG_0_INPUT_ALT_3": "Пришло время собираться с силами."
"DIALOGDATA_ENOK_BRANCH_4_DIALOG_0_SELECTION_0": "Увидимся!"
"DIALOGDATA_ENOK_BRANCH_4_DIALOG_0_SELECTION_1": "Ещё кое-что..."
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_0_INPUT": "Парирование врагов ключ к выживанию в ближнем бою."
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_1_INPUT": "Чтобы парировать, блокируй атаку незадолго до её начала."
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_2_INPUT": "При успешном парировании выносливость не тратится."
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_3_INPUT": "Но для этого противник должен быть примерно твоей силы."
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_4_INPUT": "Если же ты сразишься с врагом куда сильнее тебя,"
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_5_INPUT": "ты споткнёшься и быстро потеряешь всю выносливость."
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_6_INPUT": "Наблюдай за врагами. С хорошей стратегией они ничто не стоят."
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_6_SELECTION_0": "Увидимся!"
"DIALOGDATA_ENOK_BRANCH_5_DIALOG_6_SELECTION_1": "Ещё кое-что..."
"DIALOGDATA_ENOK_BRANCH_6_DIALOG_0_INPUT": "Пока ты сражаешься, ты должен помнить о стихийных сопротивлениях и слабостях."
"DIALOGDATA_ENOK_BRANCH_6_DIALOG_1_INPUT": "Многие монстры которые бродят в этом мире привязаны к определённым стихиям."
"DIALOGDATA_ENOK_BRANCH_6_DIALOG_2_INPUT": "Иногда при каких-то обстоятельствах, эти монстры способны изменять свои элементальные связи."
"DIALOGDATA_ENOK_BRANCH_6_DIALOG_3_INPUT": "Независимо от стихии, которой они владеют, они уязвимы к другой."
