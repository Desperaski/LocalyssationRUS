"QUEST_TRIGGER_WORLDPORTALTRIGGER_PREFIX": "Найдено"
"QUEST_TRIGGER_WORLDPORTALTRIGGER_SUFFIX": "Мировой Портал"
"QUEST_UP_AND_OVER_IT_COMPLETE_RETURN_MESSAGE": "Вернитесь к Крейгу у Стены Звезд."
"QUEST_UP_AND_OVER_IT_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Крейгу."
"QUEST_UP_AND_OVER_IT_DESCRIPTION": "<color=cyan>Слышал когда-нибудь об Испытании Звёзд?</color> Нет? ...хах. Ладно. Ну... Оно на самом деле здесь, в Стене Звёзд. \n\nЯ точно не знаю происхождения этого места, но, я слышал что, <color=cyan>это одна из самых высоких башен, когда-либо построенных...</color> это означает, что наверняка их больше чем одна.\n\nКстати, знаешь, там наверху есть то, что я ооочень хочу заполучить. <color=cyan>Это Эпическая Морковь.</color>\n\n<color=yellow>Если думаешь что сможешь взобраться на эту башню, достать это сокровище и принести мне, я отдам тебе одну из своих драгоценнейших вещей.</color> По рукам?\n"
"QUEST_UP_AND_OVER_IT_NAME": "Преодоление Верхов"
"QUEST_WHATTA_RUSH_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли."
"QUEST_WHATTA_RUSH_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_WHATTA_RUSH_DESCRIPTION": "<color=cyan>Готов ли ты обучиться чему-нить новенькому, дорогуша?</color> У меня для тя кое-что есть! Держи этот малюсенький свиток навыка.\n\n<color=yellow>Это умение - Адреналин!</color> Он вернёт твою выносливость прямиком до полного, так что сможешь навалять этим злобным тварям более устойчивей! Советую попробовать, если частенько тратишь выносливость на умения.\n\n<color=cyan>Если вдруг потеряешь этот свиток, заскочи ещё и возьми другой! У меня их полно, есть чем поделиться.</color>\n\n"
"QUEST_WHATTA_RUSH_NAME": "Что за Спешка!"
"QUEST_WICKED_WIZBOARS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_WICKED_WIZBOARS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_WICKED_WIZBOARS_DESCRIPTION": "Ах... Кхм... у меня есть к тебе просьба, малыш... Меня беспокоит кое-что, и я хотела бы, чтобы ты помог мне если можешь.\n\n<color=cyan>Понимаешь, Меккабаны в Долине Туула больше чем просто копьеносящие существа. Глубже в долине есть Анклав Туула.</color> Ты наверное бывал уже там, так как там заполонили мои собственные силы...\n\n...П-почему? О-ох, ну... это потому что эти существа скопировали мои иследованния! <color=cyan>До Раскола мира Анклав был форпостом для Мистиков, изучающих свою силу.</color> Меккабаны захватили его, освоили мои знания и стали Магкабанами.\n\n<color=yellow>Разберись с каждым Магкабаном которого найдёшь, убей 18, и принеси мне 10 их скипетров...</color> Пожалуйста, будь осторожен!\n"
"QUEST_WICKED_WIZBOARS_NAME": "Подлые Магкабаны"
"RACE_BYRDLE_DESCRIPTION": "Элегантные и ловкие путешественники, и вероятно склонные к материализму. Взрослея, Бирдлы дают клятву покинуть своё стадо из их королевства, чтобы найти свою вечную судьбу."
"RACE_BYRDLE_MISC": "Клюв"
"RACE_BYRDLE_NAME": "Бирдл"
"RACE_CHANG_DESCRIPTION": "Компактные, но выносливые. Всегда жаждут приключений выходящих за рамки их возможностей. Чанги происходят из загадочно продвинутой цивилизации, но часто были изгоями и считались сорвиголовами."
"RACE_CHANG_MISC": "Усы"
"RACE_CHANG_NAME": "Чанг"
"RACE_IMP_DESCRIPTION": "Покинутые демоны из водного царства, переплетённого с адскими машинами. Импам было недоступно самостоятельно думать или действовать, они исполняли приказы оккультистов, которые их зачастую вызывали."
"RACE_IMP_MISC": "Рожки"
"RACE_IMP_NAME": "Имп"
"RACE_KUBOLD_DESCRIPTION": "Рептилоидные отшельники, от природы искусные в магии. Родина Кубольдов - далёкая бесплодная пустыня, запечатанная тайной магической энергией."
"RACE_KUBOLD_MISC": "Рожки"
"RACE_KUBOLD_NAME": "Кубольд"
"RACE_POON_DESCRIPTION": "Древняя, но процветающая раса дриад, искусных тактиков и хитрецов. Пуны выжили в Глубоком Лесу, приспособившись к любым угрозам и перестав быть лишь добычей, способные сразиться с любым противником."
"RACE_POON_MISC": "Рога"
"RACE_POON_NAME": "Пун"
