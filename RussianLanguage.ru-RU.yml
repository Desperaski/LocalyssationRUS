"QUEST_SPIRALING_IN_THE_GROVE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_SPIRALING_IN_THE_GROVE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_SPIRALING_IN_THE_GROVE_DESCRIPTION": "<color=yellow>[(УР15-20) Квест Рощи Полумесяца]</color>\n<color=cyan>Роща Полумесяца полна порчи...</color>  Как бы ни было грустно это видеть, её нужно остановить, пока всё не вышло из-под контроля. \n\n<color=cyan>Я знаю, что ты вполне способен очистить эту осквернённую рощу, малыш...</color>\n\n<color=yellow>От начала и до конца Рощи Полумесяца, уничтожь всех там обитающих монстров.</color> Как ты знаешь, они заключены в тёмную смутную магию, и поэтому появляются только при приближении. \n\n<color=cyan>Вернись ко мне, когда очистишь Рощу от зла, и я вознагражу тебя...</color>\n"
"QUEST_SPIRALING_IN_THE_GROVE_NAME": "Кружение в Роще"
"QUEST_STRENGTH_AND_HONOR_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_STRENGTH_AND_HONOR_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_STRENGTH_AND_HONOR_DESCRIPTION": "Пришло время принять окончательное решение, заблудший. Я вижу, что сила и умения, что ты накопил, более чем достаточны <color=cyan>чтобы проявить твои истинные цвета становления Воином.</color>\n\nСтав Воином, ты превратишься в живую угрозу для тех злобных чудовищ, что заполонили этот мир. <color=yellow>Возьми этот Том.</color> Как только прочтёшь его, ты присоединишься ко мне в нашей борьбе с тьмой.\n\n<color=yellow>Если ты потерял том, не определившись с выбором, возращайся ко мне. Я дам столько, сколько нужно.</color> <color=cyan>Помни, что прочтение этого Тома необратимо.</color>"
"QUEST_STRENGTH_AND_HONOR_NAME": "Сила и Честь"
