"DIALOGDATA_ENOK_BRANCH_0_DIALOG_0_INPUT_ALT_0": "Излагай своё дело быстро."
"DIALOGDATA_ENOK_BRANCH_0_DIALOG_0_INPUT_ALT_1": "Работы невпроворот."
"DIALOGDATA_ENOK_BRANCH_0_DIALOG_0_INPUT_ALT_2": "Говори."
