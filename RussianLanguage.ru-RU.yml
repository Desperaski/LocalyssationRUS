"ITEM_TOME_OF_THE_MYSTIC_NAME_PLURAL": "Тома Мистика"
"ITEM_TOME_OF_THE_PALADIN_DESCRIPTION": "<color=lime>Можно использовать только в Безопасной Зоне.</color>\n\nТребуется ур. 28 Воина.\n\nПоддерживающий подкласс, ориентированный на одноручное оружие / щит, использует священные умения для усиления себя и союзников и наносит мощный урон. Идеальный подкласс как для заклинаний, так и для ближнего боя.\n\n==В разработке. Книга умений не завершена.=="
