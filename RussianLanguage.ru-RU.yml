"DIALOGDATA_ANGELA_BRANCH_0_DIALOG_0_INPUT_ALT_2": "Ох?"
"DIALOGDATA_ANGELA_BRANCH_0_DIALOG_0_SELECTION_0": "Неважно..."
"DIALOGDATA_ANGELA_BRANCH_0_DIALOG_0_SELECTION_1": "Я хочу узнать..."
"DIALOGDATA_ANGELA_BRANCH_0_DIALOG_0_SELECTION_2": "Есть Квесты?"
"DIALOGDATA_ANGELA_BRANCH_1_DIALOG_0_INPUT": "Ну что ж... давай посмотрим, на что ты способен, а?"
"DIALOGDATA_ANGELA_BRANCH_1_DIALOG_0_INPUT_ALT_0": "Ну что ж... давай посмотрим, на что ты способен, а?"
"DIALOGDATA_ANGELA_BRANCH_1_DIALOG_0_INPUT_ALT_1": "Хм, ну... посмотрим..."
"DIALOGDATA_ANGELA_BRANCH_1_DIALOG_0_INPUT_ALT_2": "В этом мире не помешало бы немного чистоты, верно?"
"DIALOGDATA_ANGELA_BRANCH_1_DIALOG_0_SELECTION_0": "Увидимся!"
"DIALOGDATA_ANGELA_BRANCH_1_DIALOG_0_SELECTION_1": "Ещё кое-что..."
"DIALOGDATA_ANGELA_BRANCH_2_DIALOG_0_INPUT": "Мои знания - твои, чем могу помочь?"
"DIALOGDATA_ANGELA_BRANCH_2_DIALOG_0_SELECTION_0": "На самом деле..."
"DIALOGDATA_ANGELA_BRANCH_2_DIALOG_0_SELECTION_1": "Мистики?"
"DIALOGDATA_ANGELA_BRANCH_2_DIALOG_0_SELECTION_2": "Где мы?"
"DIALOGDATA_ANGELA_BRANCH_2_DIALOG_0_SELECTION_3": "Кто ты?"
"DIALOGDATA_ANGELA_BRANCH_2_DIALOG_0_SELECTION_4": "Призыв?"
"DIALOGDATA_ANGELA_BRANCH_3_DIALOG_0_INPUT": "Мы в Святилище, последнем оплоте покоя в этом осквернённом мире..."
"DIALOGDATA_ANGELA_BRANCH_3_DIALOG_1_INPUT": "Зло не сможет проникнуть сюда, пока я здесь. Как велит мне судьба, я должна быть здесь, оберегать Святилище."
"DIALOGDATA_ANGELA_BRANCH_3_DIALOG_1_SELECTION_0": "Понятно..."
"DIALOGDATA_ANGELA_BRANCH_4_DIALOG_0_INPUT": "Ты довольно любопытен, малыш..."
"DIALOGDATA_ANGELA_BRANCH_4_DIALOG_1_INPUT": "Я - одна из трёх Хранителей, которые сопровождают эти земли с самого начала."
"DIALOGDATA_ANGELA_BRANCH_4_DIALOG_2_INPUT": "Раньше я могла видеть всё, но моя магия была подавлена... неприятными обстоятельствами."
"DIALOGDATA_ANGELA_BRANCH_4_DIALOG_3_INPUT": "Теперь я могу лишь удерживать этот Расколотый мир вместе и защищать Святилище от тьмы."
"DIALOGDATA_ANGELA_BRANCH_4_DIALOG_4_INPUT": "Без моей магии, твоя душа будет заточена, и потеряна навсегда... застряв где бы ты ни был."
"DIALOGDATA_ANGELA_BRANCH_4_DIALOG_4_SELECTION_0": "Понятно..."
"DIALOGDATA_ANGELA_BRANCH_4_DIALOG_4_SELECTION_1": "Настораживает..."
"DIALOGDATA_ANGELA_BRANCH_5_DIALOG_0_INPUT": "Ты в надёжных руках, малыш..."
"DIALOGDATA_ANGELA_BRANCH_5_DIALOG_1_INPUT": "Будь уверен: рядом с твоей душой множество других, кто сохранит эти земли чистыми."
"DIALOGDATA_ANGELA_BRANCH_5_DIALOG_2_INPUT": "Оставайся решительным и держи голову высоко... Я верю в тебя."
"DIALOGDATA_ANGELA_BRANCH_6_DIALOG_0_INPUT": "Ох? Т-ты интересуешься моими исследованиями?"
"DIALOGDATA_ANGELA_BRANCH_6_DIALOG_1_INPUT": "Кхем..."
"DIALOGDATA_ANGELA_BRANCH_6_DIALOG_2_INPUT": "Прости, меня так редко об этом спрашивают."
"DIALOGDATA_ANGELA_BRANCH_6_DIALOG_3_INPUT": "Выбор пути Мистика раскрывает потенциал разума, давая возможность творить могущественные заклинания."
"DIALOGDATA_ANGELA_BRANCH_6_DIALOG_4_INPUT": "Они могут создавать защитные барьеры, метать взрывные снаряды и пронзать близко подошедших врагов..."
"DIALOGDATA_ANGELA_BRANCH_6_DIALOG_5_INPUT": "Если вкратце, тайная магия, которой пользуются Мистики, исходит из моей собственной силы..."
"DIALOGDATA_ANGELA_BRANCH_6_DIALOG_6_INPUT": "Многовато для восприятия, не находишь?"
"DIALOGDATA_ANGELA_BRANCH_7_DIALOG_0_INPUT": "Ах, да..."
"DIALOGDATA_ANGELA_BRANCH_7_DIALOG_1_INPUT": "Ты не из этого мира, малыш. Раньше ты был живым существом где-то далеко отсюда."
"DIALOGDATA_ANGELA_BRANCH_7_DIALOG_2_INPUT": "Могло случиться что-угодно, в чём я не уверена..."
"DIALOGDATA_ANGELA_BRANCH_7_DIALOG_3_INPUT": "Я призвала твою душу - как и многие другие - чтобы она вновь обрела жизнь и защитила этот мир от тьмы."
"DIALOGDATA_ANGELA_BRANCH_7_DIALOG_4_INPUT": "Я буду следить, чтобы твоя душа оставалась чистой и защищённой от всего, что бродит за пределами."
"DIALOGDATA_ANGELA_BRANCH_7_DIALOG_4_SELECTION_0": "Понятно..."
"DIALOGDATA_ANGELA_BRANCH_7_DIALOG_4_SELECTION_1": "Почему я?"
"DIALOGDATA_ANGELA_BRANCH_8_DIALOG_0_INPUT": "Это ещё один шанс для тебя жить, не так ли?"
"DIALOGDATA_ANGELA_BRANCH_8_DIALOG_1_INPUT": "Понимаю, что это вызывает у тебя беспокойство..."
"DIALOGDATA_ANGELA_BRANCH_8_DIALOG_2_INPUT": "Однако чистилище после смерти точно не тот круг, который стоит испытывать. Твоя душа отдыхает в этом мире."
"DIALOGDATA_ANGELA_BRANCH_8_DIALOG_3_INPUT": "В этом я очень уверена, малыш..."
"DIALOGDATA_ANGELA_BRANCH_9_DIALOG_0_INPUT": ""
"DIALOGDATA_ANGELA_BRANCH_9_DIALOG_0_INPUT_ALT_0": "Береги себя, малыш..."
"DIALOGDATA_ANGELA_BRANCH_9_DIALOG_0_INPUT_ALT_1": "Я буду наблюдать за тобой."
"DIALOGDATA_ANGELA_BRANCH_9_DIALOG_0_INPUT_ALT_2": "Прощай, малыш."
"DIALOGDATA_ANGELA_BRANCH_9_DIALOG_0_INPUT_ALT_3": "Береги себя..."
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_0_INPUT": ""
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_0_INPUT_ALT_0": "Божечки!"
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_0_INPUT_ALT_1": "Ах!"
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_0_INPUT_ALT_2": "Ой божечки!"
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_1_INPUT": "Какое облегчение что мой призыв сработал... Я была почти уверена, что твоя душа навсегда потерялась."
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_2_INPUT": "Я - Анжела Флакс, Хранитель Мистиков Святилища."
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_3_INPUT": "Я понимаю, что у тебя может возникнуть несколько вопросов..."
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_4_INPUT": "Но сначала давай разберёмся, где ты находишься, хорошо?"
"DIALOGDATA_ANGELA_INTRODUCTION_BRANCH_0_DIALOG_4_SELECTION_0": "Увидимся!"
"DIALOGDATA_ANGELA_NAME_TAG": "Анжела"
"DIALOGDATA_ANGELA_QUEST_ACCEPT_RESPONSE_0": "Ах, да... Это точно задача, требующая полной сосредоточенности."
"DIALOGDATA_ANGELA_QUEST_ACCEPT_RESPONSE_1": "Пожалуйста, будь осторожен... Внешний мир непредсказуем."
"DIALOGDATA_ANGELA_QUEST_ACCEPT_RESPONSE_2": "Молюсь о твоём успехе, искатель приключений..."
"DIALOGDATA_ANGELA_QUEST_ACCEPT_RESPONSE_3": "Возвращайся целым и невредимым..."
"DIALOGDATA_ANGELA_QUEST_COMPLETE_RESPONSE_0": "Отличная работа... Впереди нас ждёт ещё многое."
"DIALOGDATA_ANGELA_QUEST_COMPLETE_RESPONSE_1": "Ах, замечательно! Я дарую тебе награду..."
"DIALOGDATA_ANGELA_QUEST_COMPLETE_RESPONSE_2": "Ты доказал, что являешься нашим даром..."
"DIALOGDATA_ANGELA_QUEST_COMPLETE_RESPONSE_3": "Ещё одна забота снята с плеч..."
"DIALOGDATA_ANGELA_QUEST_COMPLETE_RESPONSE_4": "Конечно, за твои труды полагается награда..."
"DIALOGDATA_ANGELA_QUEST_COMPLETE_RESPONSE_5": "Превосходно, но не забывай отдыхать, когда сможешь..."
"DIALOGDATA_ANGELA_QUEST_COMPLETE_RESPONSE_6": "Я одобряю это, да..."
