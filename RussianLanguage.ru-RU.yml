"QUEST_SUMMORE_FIREBREATH_BLADES_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_SUMMORE_FIREBREATH_BLADES_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_SUMMORE_FIREBREATH_BLADES_DESCRIPTION": "Хочешь сделать ещё один Огнедышащий клинок? Давай, дорогуша!\n\n<color=yellow>Принеси мне 12 таких желёз у этих тварей, Зазубренный Клинок и 5 Проклятых записок!</color>\n\nКак ток вернёшься, мы сразу сделаем клинок!\n"
"QUEST_SUMMORE_FIREBREATH_BLADES_NAME": "Ещё Огнедышащие Клинки!"
"QUEST_SUMMORE_GOLEM_CHESTPIECES_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_SUMMORE_GOLEM_CHESTPIECES_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_SUMMORE_GOLEM_CHESTPIECES_DESCRIPTION": "Ох? <color=cyan>Хоч сделать ещё один Нагрудник Голема?</color> Для этого нам понадобятся те же материалы, дорогуша!\n\n<color=yellow>Принеси мне 10 Ядер Голема и 15 Самоцветов Голема,</color> и я те его сделаю!\n"
"QUEST_SUMMORE_GOLEM_CHESTPIECES_NAME": "Ещё Нагрудники Големов!"
"QUEST_SUMMORE_MONOLITH_CHESTPIECES_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_SUMMORE_MONOLITH_CHESTPIECES_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_SUMMORE_MONOLITH_CHESTPIECES_DESCRIPTION": "Ах! Ищешь ещё один Нагрудник Монолита, хм? Ладненько! Вот что нам понадобится для него:\n\n <color=yellow>Принеси мне... Нагрудник Голема, 15 Ядер Монолита, 10 Самоцветов Монолита, и в конце концов, 5 Проклятых Записок с Карбункулов с Рощи!</color>\n\n<i>Что скажешь?</i>\n"
"QUEST_SUMMORE_MONOLITH_CHESTPIECES_NAME": "Ещё Нагрудники Монолита!"
"QUEST_SUMMORE_SPECTRAL_POWDER_COMPLETE_RETURN_MESSAGE": "Вернитесь к Салли в Святилище."
"QUEST_SUMMORE_SPECTRAL_POWDER_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Салли."
"QUEST_SUMMORE_SPECTRAL_POWDER_DESCRIPTION": "Ммм-хм! Как те тот порошок, дорогуша? Довольно изящный, <i>правда?</i>\n\nСкажем, если хочешь ещё, то собери мне немного Призрачной Пыли и Ошейников Гейстов. Мне нужно будет меньше, чем в прошлый раз. <color=cyan>Имей в виду -- Катакомбы Святилища лучшее место для добычи этих материалов!</color>\n\n<color=yellow>Принеси мне... около 20 Призрачной Пыли и 8 Ошейников Гейстов,</color> и я приготовлю ещё одну партию для тя! <i>Объем будет тоже больше.</i>"
"QUEST_SUMMORE_SPECTRAL_POWDER_NAME": "Ещё Спектрального Порошка!"
"QUEST_TETHERING_GROVE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_TETHERING_GROVE_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_TETHERING_GROVE_DESCRIPTION": "С древних времен Цитадель Полумесяца пользовалась большим уважением среди нашего рода на протяжении поколений... \n\n<color=cyan> Когда мир был Расколот, Цитадель постигла неизъяснимая порча.</color> Души из других миров здесь не прожили долгой жизни как надеялись, а друиды нашего рода обратились в осквернённых абоминаций.\n\n<color=yellow>Глубоко в Цитадели, в Восточном крыле, найдёшь Рощу Полумесяца. Дверь должна открыться когда ты будешь возле неё. Найди потерянный Сигил в Роще Полумесяца и привяжи его к своей душе.</color> Монстры, что таятся в роще, могущественны! Пожалуйста будь готов, малыш.\n"
"QUEST_TETHERING_GROVE_NAME": "Ограниченная Роща"
"QUEST_THE_COLOSSUS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Эноку в Святилище."
"QUEST_THE_COLOSSUS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Эноку."
"QUEST_THE_COLOSSUS_DESCRIPTION": "<color=yellow>[(УР15-20) Квест Рощи Полумесяца]</color>\nВижу, ты хорошо справился с врагами Цитадели Полумесяца. Хорошая работа, заблудший. <color=cyan>Теперь пора выйти за её пределы - в Рощу Полумесяца.</color> То, что ты там будешь наблюдать так это отвратительный рой тёмной магии, в котором многие из наших падших собратьев прошлых веков приняли эту порчу. \n\nДвое братьев, с которыми я был знаком, стали нечестивыми Карбункулами, столкнувшись с той же участью, что и остальные. <color=cyan>Они создали Колосса - голема, способного разорвать мир на куски.</color> Мы должны остановить их трусость. <color=yellow>Уничтожь Колосса, потом вернись ко мне.</color>\n\n<color=yellow>Если ты еще это не сделал, поговори с Анжелой. Она направит тебя в Рощу Полумесяца.</color>\n"
"QUEST_THE_COLOSSUS_NAME": "Колосс"
"QUEST_THE_EFFOLD_TERRACE_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_THE_EFFOLD_TERRACE_DESCRIPTION": "Слизни устроили тебе засаду в Катакомбах? Ладно... Значит, среди них есть Королева!\n\nКогда твоя душа восстановила сигил Катакомб, портал на Террасу Эффолд открылся для тебя. \n\nАх да! Конечно... с каждым восстановленным сигилом снова открываются связанные с ним порталы. <i>Это твоя судьба, малыш!</i>\n\n<color=cyan>Портал на Террасу Эффолд находится у развилки во Внешнем Святилище.</color> Судя по тому что я узнала, Терраса кишит отвратительными Слаймеками. В отличие от обычных слизнем, они взрослые и намного сильнее...\n\n<color=yellow>Убей 10 Слаймеков, затем возращайся ко мне целых...</color>"
"QUEST_THE_EFFOLD_TERRACE_NAME": "Терраса Эффолд"
"QUEST_THE_GALL_OF_GALIUS_COMPLETE_RETURN_MESSAGE": "Вернитесь к Аммагону в Крепость Буларр."
"QUEST_THE_GALL_OF_GALIUS_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Аммагону."
"QUEST_THE_GALL_OF_GALIUS_DESCRIPTION": "<color=cyan>Ха? Как это возможно? Галиус всё ещё среди нас, даже после его кончины? Что это за колдовской трюк?</color>\n\nЯ думаю, что взять эту крепость может оказаться куда сложнее, друг. То, что та проклятая ведьма наделала с моим народом, возможно, не даст покоя вечно... Я найду способ заставить это место сдаться.\n\nМоя жажда мести — пламя, которое никогда не угаснет.\n\nМоя жажда мести - пламя, которое никогда не угаснет. <color=yellow>Помоги мне снова уничтожить этого отвратительного зверя, и я тебя вознагражу.</color>"
"QUEST_THE_GALL_OF_GALIUS_NAME": "Наглость Галиуса"
"QUEST_THE_GLYPHIK_BOOKLET_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_THE_GLYPHIK_BOOKLET_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_THE_GLYPHIK_BOOKLET_DESCRIPTION": "Хотя многие мои книги и безделушки хранятся здесь, в Святилище, есть одна утраченная вещь, которая была мне очень дорога, малыш...\n\n<color=cyan>Конечно же, важный для меня буклет разорван на страницы и разбросан по этим разрушенным землям. Он называется Буклет Глифик и дарует своему обладателю значительное усиление магической силы!</color>\n\nПодобно Сигилам, я чувствую, где могут быть пропавшие страницы... <color=yellow>Их можно найти в Саду Луворы, Анклаве Туул, тяжёлой части Рощи Полумесяца и Крепости Буларр. Я не уверена, у кого именно сейчас эти страницы, но знаю, что существа в тех местах ими владеют.</color>\n\n<color=cyan>Если соберёшь все страницы - принеси их мне, и я отдам тебе Буклет Глифик на хранение в знак благодарности...</color> Это будет знаком моей благодарности.\n\nСчастливого пути...\n"
"QUEST_THE_GLYPHIK_BOOKLET_NAME": "Буклет Глифик"
"QUEST_THE_KEEP_WITHIN_COMPLETE_RETURN_MESSAGE": "Вернитесь к Анжеле в Святилище."
"QUEST_THE_KEEP_WITHIN_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Анжеле."
"QUEST_THE_KEEP_WITHIN_DESCRIPTION": "Мир исцеляется, малыш... Нужно узнать, что ждёт нас дальше. <color=cyan>Если моя память не подводит, во Внешнем Святилище есть портал в Древнюю Цитадель рядом с Катакомбами. В восточном и западном крыле находятся сигилы, которые нужно связать с твоей душой.</color> Прошу, приготовься к тому, что там обитает..."
"QUEST_THE_KEEP_WITHIN_NAME": "Тайны Цитадели"
"QUEST_THE_VOICE_OF_ZUULNERUDA_COMPLETE_RETURN_MESSAGE": "Вернитесь к Зууле в Часовню Старейшин."
"QUEST_THE_VOICE_OF_ZUULNERUDA_COMPLETE_RETURN_MESSAGE_TRACK": "Вернитесь к Зууле."
"QUEST_THE_VOICE_OF_ZUULNERUDA_DESCRIPTION": "<color=yellow>[(УР6-12) Квест Катакомб Святилища]</color>\nДумаю, ты готов к этому испытанию... Трудно просить тебя делать это, но это небходимо сделать, во благо этого умирающего мира. \n\n<color=cyan>Речь о моём отце.</color> Именно его падение сделало Катакомбы теми, что они есть, и единственный способ спасти Внешнее Святилище - положить конец его тирании раз и навсегда.\n\nЯ знаю, что мой отец уже не тот человек, что был прежде. Он позволил силе теневой магии подпитывать его зависимость, до такой степени что он потерял себя среди других, последовавших за ним. Да... Включая меня. <color=yellow>Он известен как Лорд Зуулнеруда. Найди его в Катакомбах и отправь его на покой.</color>\n\n"
"QUEST_THE_VOICE_OF_ZUULNERUDA_NAME": "Голос Зуулнеруды"
