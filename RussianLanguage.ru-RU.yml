"_DIALOG_DYEMERCHANT_BRANCH_0_DIALOG_0_INPUT_ALT_1": "Мы встречались раньше?"
"_DIALOG_DYEMERCHANT_BRANCH_0_DIALOG_0_INPUT_ALT_2": "Приветствую снова, хочешь прикупить немного краски?"
